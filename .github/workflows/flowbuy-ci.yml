name: flowbuy-ci

on:
  push:
    branches: ["**"]
    paths:
      - "flowbuy/**"
      - ".github/workflows/flowbuy-ci.yml"
  pull_request:
    paths:
      - "flowbuy/**"
      - ".github/workflows/flowbuy-ci.yml"

# Cancel an in-flight run for the same ref when a new commit lands.
concurrency:
  group: flowbuy-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowbuy/src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: flowbuy/src/backend/package-lock.json

      - name: Install
        run: npm ci

      # The Prisma client must be generated before tsc sees @prisma/client.
      # No database is needed for typecheck or unit tests — the orchestrator
      # tests run through the mock path because ANTHROPIC_API_KEY is unset.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  frontend:
    name: frontend (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowbuy/src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: flowbuy/src/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
