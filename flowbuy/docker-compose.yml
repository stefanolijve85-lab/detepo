services:
  postgres:
    image: postgres:16-alpine
    container_name: flowbuy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowbuy
      POSTGRES_PASSWORD: flowbuy_dev
      POSTGRES_DB: flowbuy
    ports:
      - "5432:5432"
    volumes:
      - flowbuy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowbuy -d flowbuy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flowbuy_pgdata:
